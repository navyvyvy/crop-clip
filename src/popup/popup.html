<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CropClip</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">CropClip <span id="version-badge" class="version-badge"></span></p>
          <h1>원하는 영역 녹화</h1>
          <p class="lede">방송 화면에서 필요한 영역만 선택해 녹화하고 저장하세요.</p>
        </div>
        <p id="recording-time" class="recording-time" aria-live="polite"></p>
      </header>

      <section class="stack">
        <div class="action-row">
          <button id="select-region-button" class="button secondary" type="button" title="녹화할 영역을 선택합니다.">녹화 영역 선택</button>
          <button id="clear-region-button" class="button secondary" type="button" title="선택된 영역을 해제합니다.">영역 해제</button>
          <button id="record-toggle-button" class="button primary" type="button" title="선택한 영역 녹화를 시작하거나 정지합니다.">영역 녹화</button>
        </div>
        <div id="full-action-row" class="action-row two-col">
          <button id="full-record-toggle-button" class="button secondary" type="button" title="비디오 전체 화면 녹화를 시작하거나 정지합니다.">전체 녹화</button>
          <button id="full-screenshot-button" class="button secondary" type="button" title="비디오 전체 화면 스크린샷을 캡처합니다.">전체 스크린샷</button>
        </div>

        <section class="panel">
          <div class="settings-list">
            <label class="setting-row">
              <span class="setting-copy">
                <span class="setting-title">저장 형식</span>
                <span class="setting-desc">기본은 WebM입니다.</span>
              </span>
              <span class="segmented">
                <label>
                  <input type="radio" name="output-format" value="webm" />
                  <span>WebM</span>
                </label>
                <label>
                  <input type="radio" name="output-format" value="mp4" />
                  <span>MP4</span>
                </label>
              </span>
            </label>

            <div class="setting-row">
              <span class="setting-copy">
                <span class="setting-title">비트레이트</span>
                <span class="setting-desc">화질·용량 조절, 기본 4 Mbps</span>
              </span>
              <span class="bitrate-field">
                <button id="bitrate-decrease-button" type="button" aria-label="비트레이트 감소">−</button>
                <input id="custom-video-bitrate-input" type="text" inputmode="decimal" pattern="[0-9.]*" />
                <span>Mbps</span>
                <button id="bitrate-increase-button" type="button" aria-label="비트레이트 증가">+</button>
              </span>
            </div>

            <label class="setting-row">
              <span class="setting-copy">
                <span class="setting-title">60fps 녹화</span>
                <span class="setting-desc">움직임이 많은 화면에 사용합니다.</span>
              </span>
              <span class="segmented">
                <label>
                  <input type="radio" name="fps-mode" value="off" />
                  <span>OFF</span>
                </label>
                <label>
                  <input type="radio" name="fps-mode" value="on" />
                  <span>ON</span>
                </label>
              </span>
            </label>

            <label class="setting-row">
              <span class="setting-copy">
                <span class="setting-title">다중영역</span>
                <span class="setting-desc">여러 영역을 이어 붙여 녹화합니다.</span>
              </span>
              <span class="segmented">
                <label>
                  <input type="radio" name="multi-region-mode" value="off" />
                  <span>OFF</span>
                </label>
                <label>
                  <input type="radio" name="multi-region-mode" value="on" />
                  <span>ON</span>
                </label>
              </span>
            </label>

            <div id="multi-region-count-row" class="setting-row sub-setting-row">
              <span class="setting-copy">
                <span class="setting-title">다중영역 개수</span>
                <span class="setting-desc">동시에 사용할 영역 수, 최대 4개</span>
              </span>
              <span class="count-field">
                <button id="multi-region-count-decrease-button" type="button" aria-label="다중영역 개수 감소">−</button>
                <input id="multi-region-count-input" type="text" inputmode="numeric" pattern="[0-9]*" />
                <span>개</span>
                <button id="multi-region-count-increase-button" type="button" aria-label="다중영역 개수 증가">+</button>
              </span>
            </div>

            <label class="setting-row">
              <span class="setting-copy">
                <span class="setting-title">전체 녹화 버튼</span>
                <span class="setting-desc">플레이어 녹화 버튼 표시</span>
              </span>
              <span class="segmented">
                <label>
                  <input type="radio" name="full-record-mode" value="off" />
                  <span>OFF</span>
                </label>
                <label>
                  <input type="radio" name="full-record-mode" value="on" />
                  <span>ON</span>
                </label>
              </span>
            </label>

            <label class="setting-row">
              <span class="setting-copy">
                <span class="setting-title">전체 스크린샷 버튼</span>
                <span class="setting-desc">플레이어 캡처 버튼 표시</span>
              </span>
              <span class="segmented">
                <label>
                  <input type="radio" name="full-screenshot-mode" value="off" />
                  <span>OFF</span>
                </label>
                <label>
                  <input type="radio" name="full-screenshot-mode" value="on" />
                  <span>ON</span>
                </label>
              </span>
            </label>

            <label class="setting-row">
              <span class="setting-copy">
                <span class="setting-title">시간 탐색</span>
                <span class="setting-desc">좌/우 방향키로 설정한 초만큼 이동</span>
              </span>
              <span class="segmented">
                <label>
                  <input type="radio" name="seek-button-mode" value="off" />
                  <span>OFF</span>
                </label>
                <label>
                  <input type="radio" name="seek-button-mode" value="on" />
                  <span>ON</span>
                </label>
              </span>
            </label>

            <div id="seek-seconds-row" class="setting-row sub-setting-row">
              <span class="setting-copy">
                <span class="setting-title">시간 탐색 이동 시간</span>
                <span class="setting-desc">한 번에 이동할 시간</span>
              </span>
              <span class="seek-field">
                <button id="seek-decrease-button" type="button" aria-label="이동 시간 감소">−</button>
                <input id="seek-seconds-input" type="number" min="1" max="60" step="1" />
                <span>초</span>
                <button id="seek-increase-button" type="button" aria-label="이동 시간 증가">+</button>
              </span>
            </div>

            <label class="setting-row">
              <span class="setting-copy">
                <span class="setting-title">스트리머명 파일명</span>
                <span class="setting-desc">파일명 앞에 이름을 붙입니다.</span>
              </span>
              <span class="segmented">
                <label>
                  <input type="radio" name="streamer-filename-mode" value="off" />
                  <span>OFF</span>
                </label>
                <label>
                  <input type="radio" name="streamer-filename-mode" value="on" />
                  <span>ON</span>
                </label>
              </span>
            </label>

            <label class="setting-row">
              <span class="setting-copy">
                <span class="setting-title">단축키</span>
                <span class="setting-desc">설정한 키로 페이지에서 실행</span>
              </span>
              <span class="segmented">
                <label>
                  <input type="radio" name="shortcut-mode" value="off" />
                  <span>OFF</span>
                </label>
                <label>
                  <input type="radio" name="shortcut-mode" value="on" />
                  <span>ON</span>
                </label>
              </span>
            </label>
          </div>
          <p id="fps-warning" class="warning"></p>

          <footer class="footer-links" aria-label="외부 링크">
            <button id="shortcut-settings-button" class="icon-link" type="button" title="단축키 설정" aria-label="단축키 설정">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M4 7h16v10H4z"/>
                <path fill="currentColor" d="M7 10h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2zM8 14h8v1.6H8z"/>
              </svg>
            </button>
            <button id="reset-settings-button" class="icon-link" type="button" title="전체 초기화" aria-label="전체 초기화">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12a7 7 0 1 0 2-4.9M5 5v5h5"/>
              </svg>
            </button>
            <a class="icon-link" href="https://github.com/navyvyvy/crop-clip" target="_blank" rel="noreferrer" aria-label="GitHub">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M12 2a10 10 0 0 0-3.2 19.5c.5.1.7-.2.7-.5v-1.8c-2.9.6-3.5-1.2-3.5-1.2-.5-1.1-1.1-1.4-1.1-1.4-.9-.6.1-.6.1-.6 1 0 1.6 1.1 1.6 1.1.9 1.5 2.4 1.1 3 .8.1-.7.4-1.1.7-1.3-2.3-.3-4.7-1.2-4.7-5A3.9 3.9 0 0 1 6.6 9c-.1-.3-.5-1.3.1-2.7 0 0 .9-.3 2.8 1a9.8 9.8 0 0 1 5 0c1.9-1.3 2.8-1 2.8-1 .6 1.4.2 2.4.1 2.7a3.9 3.9 0 0 1 1 2.7c0 3.9-2.4 4.8-4.7 5 .4.3.7 1 .7 2v2.3c0 .3.2.6.7.5A10 10 0 0 0 12 2Z"/>
              </svg>
            </a>
            <a class="icon-link" href="mailto:navyvyvy@naver.com" aria-label="메일">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M4 6h16v12H4z"/>
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="m4.5 7 7.5 6 7.5-6"/>
              </svg>
            </a>
          </footer>
        </section>
      </section>
    </main>
    <dialog id="shortcut-dialog" class="shortcut-dialog" tabindex="-1">
      <form method="dialog">
        <header class="dialog-head">
          <strong>단축키 설정</strong>
          <button id="shortcut-close-button" class="dialog-close" type="button" title="닫기" aria-label="닫기">×</button>
        </header>
        <div id="shortcut-list" class="shortcut-list"></div>
        <button id="shortcut-reset-button" class="button secondary full-width" type="button">단축키 초기화</button>
      </form>
    </dialog>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
