<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>녹화 결과</title>
    <link rel="stylesheet" href="./result.css" />
  </head>
  <body>
    <main class="page">
      <section class="result-card">
        <button id="close-button" class="button close-button" type="button" aria-label="결과 창 닫기">×</button>
        <header class="result-head">
          <div class="title-row">
            <h1 id="title">녹화 결과</h1>
            <div class="meta-chip" id="format-chip">WEBM · - · -</div>
          </div>
          <div class="header-actions">
            <button id="download-current-button" class="button primary" type="button">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 4v10m0 0 4-4m-4 4-4-4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5 17.5v1.2c0 .7.6 1.3 1.3 1.3h11.4c.7 0 1.3-.6 1.3-1.3v-1.2" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
              <span>다운로드</span>
            </button>
          </div>
        </header>

        <div class="preview-frame">
          <video id="preview-video" class="preview-video" controls playsinline muted></video>
        </div>

        <section class="tool-row">
          <div class="tool-group split-group">
            <h2>파일 나누기</h2>
            <select id="split-mode-select" aria-label="나누기 기준">
              <option value="duration">시간</option>
              <option value="size">용량</option>
            </select>
            <label class="split-value">
              <input id="split-value-input" type="number" min="1" max="3600" step="1" value="45" aria-label="나누기 값" />
              <span id="split-unit-label">초</span>
            </label>
            <select id="split-format-select" aria-label="나누기 파일 형식">
              <option value="mp4">MP4</option>
              <option value="webm">WebM</option>
            </select>
            <button id="split-button" class="button primary split-button" type="button">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M6 8.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Zm0 12a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="m8.2 8.2 10.3 10.3M8.2 15.8 18.5 5.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>나누기</span>
            </button>
          </div>
          <div class="tool-group convert-group" aria-label="파일 변환">
            <h2>파일 변환</h2>
            <button class="button secondary convert-button" type="button" data-convert-format="mp4">MP4</button>
            <button class="button secondary convert-button" type="button" data-convert-format="gif">GIF</button>
          </div>
        </section>
        <p id="split-status" class="split-status">시간이나 용량 기준으로 파일을 나눌 수 있습니다.</p>

        <div id="split-progress" class="progress" hidden>
          <div id="split-progress-bar" class="progress-bar"></div>
        </div>

        <section id="split-downloads" class="split-downloads" hidden>
          <div class="split-download-head">
            <strong id="split-result-summary">나눈 파일 (0개)</strong>
            <button id="download-all-button" class="button primary compact-button" type="button">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 4v10m0 0 4-4m-4 4-4-4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5 17.5v1.2c0 .7.6 1.3 1.3 1.3h11.4c.7 0 1.3-.6 1.3-1.3v-1.2" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
              <span>모두 다운로드</span>
            </button>
          </div>
          <div id="split-files-list" class="split-files-list"></div>
        </section>

        <p id="empty-message" class="empty-message"></p>
      </section>
    </main>
    <script type="module" src="./result.js"></script>
  </body>
</html>
